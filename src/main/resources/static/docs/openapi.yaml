openapi: 3.0.1
info:
  title: Recurly Billing API
  description: |
    API для управления рекуррентными платежами в образовательных проектах.

    **Особенности:**
    - Поддержка российских платежных систем (ЮKassa, CloudPayments)
    - Соответствие ФЗ-152 о персональных данных
    - Многоарендная архитектура (multi-tenant)
    - Вебхуки для уведомления о событиях платежей
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Generated server url
security:
  - TenantAuth: []
tags:
  - name: 🔄 Подписки
    description: |
      Управление подписками клиентов на рекуррентные платежи.
      
      **Что такое подписка?**
      
      Подписка — это договорённость о периодическом списании средств
      с карты клиента в пользу организации (тенанта). Используется для:
      - Оплаты доступа к образовательным курсам
      - Ежемесячных членских взносов
      - Автоматического продления лицензий
      
      **Жизненный цикл подписки:**
      ```
      created → trialing → active → (renewed × N) → canceled/expired
      ```
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ (выдаётся при регистрации)
  - name: 💰 Тарифные планы
    description: |
      Управление тарифными планами для рекуррентных платежей.
      
      **Что такое план?**
      
      План — это шаблон подписки с фиксированными параметрами:
      - Сумма и валюта платежа
      - Интервал списания (ежемесячно, ежегодно и т.д.)
      - Пробный период (опционально)
      - Описание и название для отображения клиенту
      
      Планы привязаны к тенанту и используются при создании подписок.
      
      **Примеры использования:**
      - «Базовый» — 990 ₽/месяц, без триала
      - «Премиум» — 2490 ₽/месяц, 7 дней триала
      - «Годовой» — 9990 ₽/год, скидка 20%
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ
  - name: 📊 Аналитика
    description: |
      Бизнес-аналитика и метрики для организации.
      
      **Зачем нужна аналитика?**
      
      Эндпоинты аналитики предоставляют агрегированные данные для:
      - 📈 Отслеживания роста выручки и ключевых метрик бизнеса
      - 🎯 Принятия решений на основе данных (какие тарифы популярны)
      - 📊 Подготовки отчётов для руководства или инвесторов
      - 🔍 Выявления аномалий (падение конверсии, рост отмен)
      
      **Что включено в аналитику:**
      
      | Раздел | Метрики |
      |--------|---------|
      | 💰 Выручка | MRR, ARR, общая сумма платежей, средний чек |
      | 🔄 Подписки | Активные, новые, отменённые, коэффициент удержания |
      | 👥 Клиенты | Всего клиентов, новые за период, активные плательщики |
      | 💳 Платежи | Успешные, неудачные, возвраты, конверсия |
      | 📅 Динамика | Сравнение с предыдущим периодом (день/неделя/месяц) |
      
      **Производительность и кэширование:**
      
      - Аналитика вычисляется **асинхронно** и кэшируется на 15 минут
      - При первом запросе после сброса кэша ответ может формироваться до 10 секунд
      - Для исторических данных (>90 дней) рекомендуется использовать экспорт в CSV
      - Тяжёлые запросы можно запускать через вебхук (планируется)
      
      **Конфиденциальность:**
      
      - Возвращаются только агрегированные данные вашего тенанта
      - Персональные данные клиентов (имена, контакты) не включаются в метрики
      - Доступ к аналитике имеют только авторизованные запросы с валидным `X-API-Key`
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ
  - name: 👥 Клиенты
    description: |
      Управление клиентами (плательщиками) организации.
      
      **Что такое клиент?**
      
      Клиент — это конечный пользователь, который оплачивает подписки
      в пользу организации (тенанта). Примеры:
      - Студент, оплачивающий доступ к курсам
      - Родитель, оплачивающий обучение ребёнка
      - Сотрудник компании с корпоративной подпиской
      
      **Важные особенности:**
      
      - Клиенты идентифицируются по **вашему внешнему ID** (`externalId`),
        а не по внутреннему системному ID. Это позволяет легко связывать
        данные между вашей системой и платежным шлюзом.
      
      - Один `externalId` уникален в рамках одного тенанта, но может
        повторяться у разных тенантов (мультиарендность).
      
      - Данные клиентов обрабатываются в соответствии с **ФЗ-152**
        «О персональных данных»: контакты шифруются, доступ логируется.
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ
  - name: 🎓 Подписка студента
    description: |
      Управление подпиской из личного кабинета студента.
      
      **Зачем нужен этот эндпоинт?**
      
      `StudentSubscriptionController` позволяет студенту самостоятельно:
      - 🔍 Просмотреть свою активную подписку и её параметры
      - ❌ Отменить подписку (с выбором: немедленно или в конце периода)
      
      **Ключевые отличия от админ-эндпоинтов:**
      
      | Аспект | Админ-эндпоинты (`/api/v1/subscriptions`) | Студент-эндпоинты (`/api/v1/student`) |
      |--------|-------------------------------------------|---------------------------------------|
      | Авторизация | `X-Tenant-ID` + `X-API-Key` | `X-Student-Token` (JWT) |
      | Область данных | Все клиенты тенанта | Только данные текущего студента |
      | Действия | Создание, чтение, отмена для любого клиента | Только чтение/отмена своей подписки |
      | Безопасность | Проверка по API-ключу | Проверка по подписанному JWT |
      
      **Безопасность:**
      
      - Студент получает доступ **только к своим данным** — нельзя посмотреть подписки других студентов того же тенанта
      - Токен `X-Student-Token` содержит `tenantId` и `studentExternalId` в claims — дополнительная проверка не требуется
      - Все действия логируются в аудит-лог с указанием `actor: student:{id}`
      
      **Авторизация**
      
      Все запросы требуют заголовок:
      - `X-Student-Token` — JWT-токен, полученный после входа через `/api/v1/student/login`
      
      **Не требуются:** `X-Tenant-ID` и `X-API-Key` — они извлекаются из токена.
  - name: 💳 Платежи
    description: |
      Управление платежами и обработка уведомлений от платёжных систем.
      
      **Архитектура обработки платежей:**
      ```
      Клиент → Ваш фронтенд → Recurly API → YooKassa
                                    ↓
      YooKassa → Webhook → /api/v1/payments/webhook → Обновление статуса
      ```
      
      **Типы эндпоинтов:**
      
      | Эндпоинт | Авторизация | Назначение |
      |----------|-------------|------------|
      | `POST /webhook` | 🔐 Подпись YooKassa (`X-Signature`) | Приём уведомлений от платёжной системы |
      | `GET /{id}` | 🔑 `X-Tenant-ID` + `X-API-Key` | Получение информации о платеже |
      | `GET /success` | ❌ Публичный | Страница успешной оплаты (редирект) |
      
      **Безопасность вебхуков:**
      
      Все запросы от ЮKassa на `/webhook` должны содержать заголовок `X-Signature`.
      Это HMAC-SHA256 подпись тела запроса, вычисленная с использованием
      вашего секретного ключа. Система автоматически проверяет подпись
      и отклоняет неподписанные запросы.
      
      **Настройка в ЮKassa:**
      1. ЛК ЮKassa → Интеграция → Уведомления
      2. Укажите URL: `https://api.yoursite.com/api/v1/payments/webhook`
      3. Включите события: `payment.succeeded`, `payment.canceled`, `payment.waiting_for_capture`
      4. Скопируйте секретный ключ и добавьте в `application.properties`:
         ```properties
         yookassa.secret-key=your_secret_key_here
         ```
  - name: 🏢 Тенанты
    description: |
      Управление организациями в системе рекуррентных платежей.
      
      **Авторизация**
      
      Защищённые эндпоинты требуют два заголовка:
      - `X-Tenant-ID` — идентификатор организации
      - `X-API-Key` — секретный ключ (выдаётся при регистрации)
  - name: 🔐 Доступ
    description: |
      Проверка прав доступа студента к платному контенту.
      
      **Зачем нужен этот эндпоинт?**
      
      `AccessController` отвечает на вопрос: **«Может ли этот студент смотреть этот курс?»**
      
      Типичный сценарий использования:
      ```
      Студент открывает урок в LMS
               ↓
      LMS вызывает: GET /api/v1/access/check?studentId=...&planCode=...
               ↓
      Recurly проверяет: есть ли активная подписка на этот план?
               ↓
      Ответ: { "hasAccess": true, "expiresAt": "2026-04-30" }
               ↓
      LMS: показывает контент ИЛИ предлагает оформить подписку
      ```
      
      **Ключевые особенности:**
      
      - ✅ **Быстрый ответ**: метод оптимизирован для частых вызовов (кэширование, индексы)
      - ✅ **Идемпотентность**: повторный запрос с теми же параметрами вернёт тот же результат
      - ✅ **Безопасность**: проверка принадлежности студента к тенанту предотвращает доступ к чужим данным
      - ✅ **Детальные статусы**: коды `HAS_ACCESS`, `NO_ACTIVE_ACCESS`, `STUDENT_NOT_FOUND` помогают фронтенду показать правильное сообщение
      
      **Что проверяется:**
      
      1. Валидность заголовков авторизации (`X-Tenant-ID`, `X-API-Key`)
      2. Принадлежность студента (`studentId`) к указанному тенанту
      3. Наличие активной подписки на план с указанным `planCode`
      4. Срок действия доступа (если есть `expiresAt`)
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ
  - name: 🔍 Аудит
    description: |
      Журнал аудита действий в системе.
      
      **Зачем нужен аудит?**
      
      Аудит-лог фиксирует все значимые события в системе для:
      - ✅ Соответствия **ФЗ-152** «О персональных данных» (требование о логировании доступа)
      - 🔍 Расследования инцидентов безопасности и несанкционированного доступа
      - 🐛 Отладки проблем: кто, когда и что изменил
      - 📊 Аналитики использования системы администраторами
      
      **Что логируется:**
      | Событие | Пример |
      |---------|--------|
      | `tenant.created` | Регистрация новой организации |
      | `subscription.created` | Оформление подписки клиентом |
      | `payment.succeeded` | Успешное проведение платежа |
      | `customer.updated` | Изменение контактных данных |
      | `api.key_used` | Использование API-ключа |
      | `auth.failed` | Неудачная попытка авторизации |
      
      **Хранение и доступ:**
      - Логи хранятся **отдельно от основных данных** (таблица `audit_log`)
      - Доступ к логам имеют только авторизованные запросы с валидным `X-API-Key`
      - Чувствительные данные (пароли, полные номера карт) **не записываются** в лог
      - Срок хранения: настраивается политикой тенанта (по умолчанию 3 года)
      
      **Авторизация**
      
      Все запросы требуют заголовки:
      - `X-Tenant-ID` — идентификатор вашей организации
      - `X-API-Key` — секретный ключ
  - name: 🔑 Аутентификация
    description: |
      Аутентификация студентов по одноразовому коду.
      
      **Зачем нужен этот эндпоинт?**
      
      `StudentAuthController` реализует безопасный вход студента в систему
      без использования пароля — через **одноразовый код подтверждения**.
      
      Типичный сценарий:
      ```
      1. Студент вводит email/телефон в форме входа
      2. Система отправляет код (6 цифр) через смс или письмо
      3. Студент вводит код → вызывает POST /api/v1/student/login
      4. При успехе получает JWT-токен для последующих запросов
      5. Токен используется в заголовке Authorization для доступа к контенту
      ```
      
      **Преимущества подхода:**
      
      - 🔐 **Без паролей**: нет риска утечки, не нужно хранить хеши
      - ⏱ **Временные коды**: код действует 5-10 минут, затем невалиден
      - 📱 **Удобство**: студенту не нужно запоминать пароль
      - 🛡 **Защита от брутфорса**: лимит попыток ввода кода (3-5 раз)
      
      **Безопасность:**
      
      - Коды хранятся в зашифрованном виде с TTL (автоматическое удаление)
      - После 3 неудачных попыток — временная блокировка на 15 минут
      - Токены имеют срок жизни (например, 24 часа) и могут быть отозваны
      - Все попытки входа логируются в аудит-лог для мониторинга
      
      **Важно:**
      
      - Этот эндпоинт **публичный** — не требует заголовков `X-Tenant-ID` / `X-API-Key`
      - `tenantId` передаётся в теле запроса и валидируется вместе с кодом
      - Ответ содержит только токен — никаких персональных данных студента
paths:
  /api/v1/tenants/onboard:
    post:
      tags:
        - 🏢 Тенанты
      summary: 📋 Зарегистрировать новую организацию
      description: |
        Создаёт новую организацию в системе и выдаёт учётные данные для доступа к API.

        **Когда использовать:**
        - При подключении новой образовательной платформы к системе платежей
        - При регистрации нового клиента в вашей системе

        **Что происходит:**
        1. Валидация входных данных (название, контакты, настройки)
        2. Генерация уникального `tenantId` и `apiKey`
        3. Создание записи в базе данных
        4. Возврат учётных данных для дальнейшей авторизации

        **Важно:**
        - Метод не требует аутентификации (публичный эндпоинт)
        - После успешной регистрации сохраните `apiKey` — он не будет показан повторно
        - Данные обрабатываются в соответствии с ФЗ-152 «О персональных данных»
      operationId: onboardTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantOnboardingRequest"
        required: true
      responses:
        "201":
          description: ✅ Организация успешно зарегистрирована
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantOnboardingResponse"
              examples:
                Успешная регистрация:
                  description: Успешная регистрация
                  value:
                    tenantId: tn_7f8a9b2c3d4e5f6g
                    organizationName: Онлайн-школа «ПрофИТ»
                    apiKey: sk_test_XXXXXXXXXXXXXXXXXXXXXXXX
                    createdAt: 2024-03-31T10:30:00Z
                    status: ACTIVE
                    paymentSettings:
                      provider: YOOKASSA
                      currency: RUB
                      recurringEnabled: true
        "409":
          description: ⚠️ Организация с таким названием или email уже существует
          content:
            '*/*':
              example:
                timestamp: 2024-03-31T10:30:00Z
                status: 409
                error: Conflict
                message: Organization with email 'info@profit-school.ru' already exists
        "400":
          description: ❌ Ошибка валидации входных данных
          content:
            '*/*':
              examples:
                Пустое название:
                  description: Пустое название
                  value:
                    timestamp: 2024-03-31T10:30:00Z
                    status: 400
                    error: Bad Request
                    message: "organizationName: не может быть пустым"
                Неверный формат телефона:
                  description: Неверный формат телефона
                  value:
                    timestamp: 2024-03-31T10:30:00Z
                    status: 400
                    error: Bad Request
                    message: "contactPhone: неверный формат номера телефона"
        "500":
          description: 💥 Внутренняя ошибка сервера
          content:
            '*/*':
              example:
                timestamp: 2024-03-31T10:30:00Z
                status: 500
                error: Internal Server Error
                message: Произошла непредвиденная ошибка. Попробуйте позже.
  /api/v1/subscriptions:
    post:
      tags:
        - 🔄 Подписки
      summary: 🔄 Создать новую подписку
      description: |
        Создаёт подписку для клиента и инициирует первый платёж (если нет пробного периода).

        **Когда использовать:**
        - Клиент оформил покупку курса с ежемесячной оплатой
        - Пользователь активировал авто-продление подписки
        - Администратор вручную создал подписку для ученика

        **Особенности:**
        - Поддерживается **идемпотентность**: передайте `Idempotency-Key`,
          чтобы избежать дублирования при повторных запросах
        - Если у подписки есть пробный период (`trial_days > 0`),
          первый платёж не создаётся сразу — статус будет `trialing`
        - При успешном создании платежа возвращается ссылка на подтверждение
          (для 3-D Secure или редиректа в платёжную систему)

        **Идемпотентность:**

        Заголовок `Idempotency-Key` гарантирует, что повторный запрос
        с тем же ключом не создаст дубликат подписки или платежа.
        Если ключ не передан — он генерируется автоматически (но тогда
        повторный запрос может создать дубликат).

        **Рекомендация:**
        Всегда генерируйте `Idempotency-Key` на стороне клиента
        (например, UUID) и сохраняйте его до получения успешного ответа.
      operationId: createSubscription
      parameters:
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCreateRequest"
        required: true
      responses:
        "201":
          description: ✅ Подписка создана (пробный период)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
              examples:
                Успех с триалом:
                  description: Успех с триалом
                  value:
                    id: sub_trial_abc123
