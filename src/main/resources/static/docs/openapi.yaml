                  value:
                    error: "INVALID_CODE: Код не совпадает с выданным"
                Код истёк:
                  description: Код истёк
                  value:
                    error: "CODE_EXPIRED: Срок действия кода истёк. Запросите новы\
                      й."
                Слишком много попыток:
                  description: Слишком много попыток
                  value:
                    error: "TOO_MANY_ATTEMPTS: Превышен лимит попыток. Повторите ч\
                      ерез 15 минут."
        "500":
          description: 💥 Внутренняя ошибка сервера
          content:
            '*/*':
              example:
                error: Internal server error
