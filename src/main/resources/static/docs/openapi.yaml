                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJzdHVkZW50X2l2YW5fMjAyNCIsInRlbmFudCI6IjY1NDZ0ZHMiLCJpYXQiOjE3MTE5MjI4NTgsImV4cCI6MTcxMjAwOTI1OH0.abc123def456
        "400":
          description: ❌ Ошибка валидации или неверный код
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                Неверный код:
