spring.application.name=recurly-billing

# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

#YOOKASSA
yookassa.shop-id=${SHOP_ID}
yookassa.secret-key=${SECRET_KEY}
yookassa.api-url=${API_URL}
payment.return-url=https://pseudosiphonic-preabstract-alison.ngrok-free.dev/api/v1/payments/success
server.tomcat.protocol-header=x-forwarded-proto
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.internal-proxies=.*

#ENCRYPT
encryption.key=abcdefghijklmnopqrstuvwxyz123456

# TELEGRAM
telegram.bot.token=${TG_BOT_TOKEN}
telegram.bot.username=${TG_BOT_NAME}

# ???????????
notifications.telegram.enabled=true
notifications.email.enabled=false
notifications.upcoming-days=3

# DOCUMENTATION
springdoc.api-docs.path=/api-docs
springdoc.api-docs.title=Recurly Billing API
springdoc.api-docs.description=???????????? ? ??????? ?????????? ???????????? ????????
springdoc.swagger-ui.enabled=true
springdoc.api-docs.groups.enabled=true

# MONITORING
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=recurly-billing
management.health.db.enabled=true
spring.datasource.hikari.connection-timeout=5000
management.health.diskspace.enabled=true
management.health.yookassa.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
