groups:
  - name: recurly-billing-alerts
    rules:
      - alert: NoSuccessfulPayments
        expr: rate(recurly_payments_success_total[10m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Нет успешных платежей за последние 10 минут"
          description: "Проверьте интеграцию с ЮKassa и логи приложения"

      - alert: HighPaymentFailureRate
        expr: |
          sum(recurly_payments_failed_total) / 
          (sum(recurly_payments_success_total) + sum(recurly_payments_failed_total)) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокий процент неудачных платежей (>10%)"
          description: "Возможно, проблема с платёжными методами или валидацией"

      - alert: ApplicationDown
        expr: up{job="recurly-billing"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Приложение Recurly Billing не отвечает"
          description: "Проверьте сервер, логи и зависимости"

      - alert: HighChurnRate
        expr: |
          rate(recurly_subscriptions_cancelled_total[1h]) / 
          rate(recurly_subscriptions_created_total[1h]) > 0.3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Высокий коэффициент оттока подписок"
          description: "Проверьте, нет ли проблем с биллингом или качеством сервиса"

      - alert: YooKassaDown
        expr: yookassa_health_status == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Интеграция с ЮKassa недоступна"
          description: "Проверьте сетевое соединение и настройки клиента"